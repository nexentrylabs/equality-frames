<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equality Frames - Premium 4K Wallpapers</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0f0f12;
            color: #ffffff;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5rem;
            color: #00ffcc;
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .wallpaper-card {
            background-color: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .wallpaper-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 250px;
            background-color: #222;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.15);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        .card-info {
            padding: 20px;
            text-align: center;
        }

        .card-info h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .card-info p {
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            display: inline-block;
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s ease;
        }

        .buy-btn:hover {
            background: linear-gradient(45deg, #0099ff, #00ffcc);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Equality Frames</h1>
        <p>Premium & Exclusive 4K Wallpapers</p>
    </header>

    <main class="wallpaper-grid">
        
        <div class="wallpaper-card">
            <div class="image-container">
                <img src="ChatGPT Image May 18, 2026, 12_30_46 PM.png" alt="Wallpaper 1">
                <div class="watermark">Equality Frames</div>
            </div>
            <div class="card-info">
                <h3>Cinematic Portrait - 4K</h3>
                <p>किंमत: ₹49</p>
                <a href="#" target="_blank" class="buy-btn">Buy 4K Version</a>
            </div>
        </div>

        <div class="wallpaper-card">
            <div class="image-container">
                <img src="ChatGPT Image May 21, 2026, 01_01_08 PM.png" alt="Wallpaper 2">
                <div class="watermark">Equality Frames</div>
            </div>
            <div class="card-info">
                <h3>Premium Wallpaper 2</h3>
                <p>किंमत: ₹49</p>
                <a href="#" target="_blank" class="buy-btn">Buy 4K Version</a>
            </div>
        </div>

        <div class="wallpaper-card">
            <div class="image-container">
                <img src="ChatGPT Image May 21, 2026, 12_44_28 PM.png" alt="Wallpaper 3">
                <div class="watermark">Equality Frames</div>
            </div>
            <div class="card-info">
                <h3>Premium Wallpaper 3</h3>
                <p>किंमत: ₹49</p>
                <a href="#" target="_blank" class="buy-btn">Buy 4K Version</a>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Equality Frames. All Rights Reserved.</p>
    </footer>

</body>
</html>
