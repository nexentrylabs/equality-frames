<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equality Frames</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0d1117;
    color:white;
    text-align:center;
}

header{
    background:#161b22;
    padding:25px;
    font-size:35px;
    font-weight:bold;
    color:#58a6ff;
    box-shadow:0 0 10px black;
}

.hero{
    padding:60px 20px;
}

.hero h1{
    font-size:50px;
}

.hero p{
    color:#8b949e;
    font-size:20px;
}

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:30px;
}

.card{
    background:#161b22;
    border-radius:15px;
    overflow:hidden;
    width:320px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.card h2{
    margin:15px 0;
}

button{
    margin-bottom:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#238636;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}

footer{
    padding:25px;
    background:#161b22;
    color:#8b949e;
    margin-top:30px;
}

</style>

</head>

<body>

<header>
Equality Frames
</header>

<section class="hero">
<h1>Cinematic AI Wallpapers</h1>
<p>Premium Wallpapers & Photoshop Designs</p>
</section>

<section class="gallery">

<div class="card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
<h2>Nature Wallpaper</h2>
<button>Download</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e">
<h2>Mountain Art</h2>
<button>Buy Premium</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511300636408-a63a89df3482">
<h2>Dark Cinematic</h2>
<button>Download</button>
</div>

</section>

<footer>
© 2026 Equality Frames
</footer>

</body>
</html>
